<form
  hx-post="{% url 'profile-usernamechange' %}"
  hx-select="content"
  hx-target="content"
  hx-swap="outerHTML"
  class="flex gap-2 text-black"
  autocomplete="off"
>
  {% csrf_token %}
  {% for field in form %}{{ field }}{% endfor %}
  <button class="block !bg-gray-800" type="submit">Submit</button>
</form>

<a
  hx-swap-oob="true"
  id="username-edit"
  hx-get="{% url 'profile-settings' %}"
  hx-target="content"
  hx-swap="outerHTML"
  hx-select="content"
  class="font-medium text-blue-600 hover:underline"
>
  Cancel
</a>
