services:
  web:
    build: .
    command: /app/scripts/entrypoint.sh
    volumes:
      - .:/app:z
    ports:
      - "8090:8090"
    env_file:
      - ./.env
    environment:
      MARIMO_SERVICE_URL: ${MARIMO_SERVICE_URL:-http://127.0.0.1:8091}
      MARIMO_EDITOR_URL: ${MARIMO_EDITOR_URL:-http://127.0.0.1:8092}
    depends_on:
      - db

  marimo-run:
    build: .
    command: marimo run lab/notebooks --host 0.0.0.0 --port 8091 --headless --no-token
    volumes:
      - .:/app:z
    ports:
      - "8091:8091"
    env_file:
      - ./.env
    environment:
      DJANGO_SECRET_KEY: ${SECRET_KEY}
      DJANGO_API_URL: ${DJANGO_API_URL:-http://web:8090}
    depends_on:
      - web

  marimo-edit:
    build: .
    command: marimo edit lab/notebooks --host 0.0.0.0 --port 8092 --headless --no-token
    volumes:
      - .:/app:z
    ports:
      - "8092:8092"
    env_file:
      - ./.env
    environment:
      DJANGO_SECRET_KEY: ${SECRET_KEY}
      DJANGO_API_URL: ${DJANGO_API_URL:-http://web:8090}
    depends_on:
      - web

  caddy:
    image: docker.io/library/caddy:2
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - .:/app:z
    ports:
      - "8093:80"
      - "8443:443"
    depends_on:
      - web

  db:
    image: postgres:18
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}

volumes:
  postgres_data:
