{% for group in groups %}
    <div class="{% if not forloop.first %}mt-2 border-t border-gray-300 pt-2{% endif %}">
        <div class="flex flex-col gap-y-1">
            {% for row in group.rows %}
                {% if row.count %}
                    <div class="flex justify-between gap-2">
                        <span class="min-w-0 leading-tight">{{ row.name }}</span>
                        <span class="font-semibold tabular-nums shrink-0">{{ row.count }}</span>
                    </div>
                {% endif %}
            {% endfor %}
        </div>
    </div>
{% endfor %}
