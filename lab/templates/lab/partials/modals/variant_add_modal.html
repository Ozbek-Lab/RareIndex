<div class="modal-header border-b border-base-200 pb-4 mb-4">
  <h3 class="font-bold text-lg text-primary flex items-center gap-2">
    <i class="fa-solid fa-plus-circle"></i>
    {{ title }}
  </h3>
</div>

<form
  hx-post="{{ variant_add_post_url }}"
  hx-target="#generic-modal-content"
  hx-swap="innerHTML"
  class="space-y-4"
>
  {% csrf_token %}

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="form-control w-full md:col-span-2">
      <label class="label py-1">
        <span class="label-text font-semibold text-xs opacity-70">Variant type</span>
      </label>
      {{ type_form.variant_type }}
    </div>

    <div id="variant-type-fields" class="md:col-span-2">
      {% include "lab/partials/modals/variant_add_fields.html" %}
    </div>
  </div>

  <div class="modal-action mt-8 pt-4 border-t border-base-200 flex justify-between">
    <button type="button" class="btn btn-ghost btn-sm" onclick="document.getElementById('generic-modal').close()">Cancel</button>
    <button type="submit" class="btn btn-primary btn-sm px-8">
      Save Changes
    </button>
  </div>
</form>
